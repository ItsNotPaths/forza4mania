name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  PROJECT_NAME: forzamania
  # Opt all actions/* (which are still on Node 20) into the runner's
  # Node 24 toolchain — Node 20 is being removed Sept 16 2026 per
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # One Nuitka build per target OS, on a native runner (no cross-compile). Both
  # call scripts/build_release.sh — the SAME script as `release.sh --local` — so
  # the local and CI builds can't drift. Each job packages its own dist in a
  # perm-preserving archive (tar.gz on Linux keeps the +x bits that
  # upload-artifact would otherwise drop; zip on Windows is the native form).
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache vendor/
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ matrix.platform }}-${{ hashFiles('download-deps.sh') }}

      - name: Download deps (libmspack, Forza-X360-IO, blendermania-addon)
        shell: bash
        run: |
          chmod +x ./download-deps.sh
          ./download-deps.sh

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          # patchelf: Nuitka --standalone needs it to rewrite RPATHs on Linux.
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install --upgrade pip
          python -m pip install nuitka numpy

      - name: Install build deps (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          # Nuitka uses the runner's MSVC for the app; the mingw `gcc` on PATH
          # builds the static lzxd_helper.exe (see build_release.sh).
          python -m pip install --upgrade pip
          python -m pip install nuitka numpy

      - name: Nuitka build (shared script)
        shell: bash
        env:
          PYTHON: python   # setup-python exposes `python` on every OS
        run: |
          chmod +x scripts/build_release.sh
          scripts/build_release.sh "$PWD/dist-stage"

      - name: Package (Linux tar.gz — preserves exec bits)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          tar -C dist-stage -czf "${PROJECT_NAME}-${{ inputs.version }}-linux.tar.gz" .

      - name: Package (Windows zip)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist-stage/* -DestinationPath "${env:PROJECT_NAME}-${{ inputs.version }}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ env.PROJECT_NAME }}-${{ inputs.version }}-linux.tar.gz
            ${{ env.PROJECT_NAME }}-${{ inputs.version }}-windows.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ inputs.version }}" \
              "artifacts/${PROJECT_NAME}-${{ inputs.version }}-linux.tar.gz" \
              "artifacts/${PROJECT_NAME}-${{ inputs.version }}-windows.zip" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${{ inputs.version }}" \
              --notes "${{ inputs.notes }}" \
              $PRERELEASE_FLAG
